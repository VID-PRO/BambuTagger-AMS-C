# ============================================================
#  BambuTagger-AMS-C — Automatic Build & Release (PlatformIO)
#  Compiles the ESP32 firmware and publishes a GitHub Release
#  every time a version tag (v*) is pushed.
#  A normal push to main only compiles (smoke-test, no release).
# ============================================================

name: Build & Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - "v*"
      - "[0-9]*"
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install platformio esptool

      - name: Build firmware
        run: pio run

      - name: Prepare build artifacts
        run: |
          mkdir -p build
          cp .pio/build/esp32-ams-c/firmware.bin build/
          cp .pio/build/esp32-ams-c/bootloader.bin build/
          cp .pio/build/esp32-ams-c/partitions.bin build/
          cp ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin build/

      - name: Create merged binary
        run: |
          esptool.py --chip esp32 merge_bin \
            --output build/firmware_merged.bin \
            --flash_mode qio \
            --flash_freq 80m \
            --flash_size 4MB \
            0x1000   build/bootloader.bin \
            0x8000   build/partitions.bin \
            0xe000   build/boot_app0.bin \
            0x10000  build/firmware.bin

          echo "=== Build artefacts ==="
          ls -lh build/

      - name: Upload firmware artefacts
        uses: actions/upload-artifact@v4
        with:
          name: BambuTagger-AMS-C-firmware-${{ github.sha }}
          retention-days: 30
          path: |
            build/firmware.bin
            build/bootloader.bin
            build/partitions.bin
            build/firmware_merged.bin

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "BambuTagger-AMS-C ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            build/firmware.bin
            build/bootloader.bin
            build/partitions.bin
            build/firmware_merged.bin
          body: |
            ## Flashing instructions

            ### Easiest — merged binary (single file, address 0x00)
            ```
            esptool.py --chip esp32 --port /dev/ttyUSB0 --baud 921600 \
              write_flash 0x0 firmware_merged.bin
            ```

            ### Manual — separate files
            ```
            esptool.py --chip esp32 --port /dev/ttyUSB0 --baud 921600 \
              write_flash \
              0x1000   bootloader.bin \
              0x8000   partitions.bin \
              0x10000  firmware.bin
            ```

            > **Board:** ESP32 Dev Module  
            > **Build system:** PlatformIO  
            > **Flash:** 4 MB, QIO, 80 MHz

            ### OTA Update
            Upload `firmware.bin` via the web interface (Status → Update Firmware).
